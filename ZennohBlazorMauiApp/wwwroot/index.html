<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
	<title>ZennohBlazorMauiApp</title>
	<base href="/" />
	<link rel="stylesheet" href="_content/ZennohBlazorShared/css/bootstrap/bootstrap.min.css" />
	<link href="_content/ZennohBlazorShared/css/app.css" rel="stylesheet" />
	<link href="ZennohBlazorMauiApp.styles.css" rel="stylesheet" />
	<link rel="stylesheet" href="_content/Radzen.Blazor/css/humanistic-base.css">
	<link rel="stylesheet" href="_content/Radzen.Blazor/css/humanistic.css">
	<script src="_content/Radzen.Blazor/Radzen.Blazor.js"></script>
	<script src="_content/BlazorInputFile/inputfile.js"></script>
</head>

<body>

	<div class="status-bar-safe-area"></div>
	<!--ChartJS Script-->
	<script type="text/javascript" src="_content/ZennohBlazorShared/lib/Chart.js/chart.umd.min.js"></script>
	<script>
		function renderChart(data) {
			if (window.chartObj) {
				window.chartObj.destroy();
			}
			console.log("chart open");
			console.log("json=" + data);
			var ctx = document.getElementById('myChart');
			window.chartObj = new Chart(ctx, JSON.parse(data));
			console.log("finish");
		};
	</script>

	<!--<div id="app">Loading...</div>-->
	<div id="app">
		<svg class="loading-progress">
			<circle r="40%" cx="50%" cy="50%" />
			<circle r="40%" cx="50%" cy="50%" />
		</svg>
		<div class="loading-progress-text"></div>
	</div>

	<div id="blazor-error-ui">
		An unhandled error has occurred.
		<a href="" class="reload">Reload</a>
		<a class="dismiss">🗙</a>
	</div>

	<script src="_framework/blazor.webview.js" autostart="false"></script>

</body>

</html>
